<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Sabah Al Ahmad Urology Centre — Antimicrobial Guide</title><meta name="theme-color" content="#FFFFFF"><link rel="manifest" href="manifest.webmanifest"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="SAUC AMS"><link rel="apple-touch-icon" href="icons/apple-touch-icon.png"><link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"><link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>:root{
  --bg:#F1F4F8; --card:#FFFFFF; --line:#E4E8EF;
  --ink:#1E2A3B; --text:#3C4657; --muted:#6A7688;
  --accent:#4F3EEC; --accent-050:#EEECFD; --accent-line:#DAD6FB;
  --access:#3DA35D; --watch:#E0932B; --reserve:#D24B44; --na:#7F8A9C;
  --catA:#4C5872; --catB:#3B9BD8; --catC:#17B0A8; --catD:#F0A93B;
  --radius:12px;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);}
body{font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
#app{max-width:720px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
button{font-family:inherit;}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

/* top bar */
.topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:8px;padding:10px 12px;min-height:54px;}
.topbar .back{background:transparent;border:none;color:var(--accent);width:38px;height:38px;border-radius:9px;
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}
.topbar .back:hover{background:var(--accent-050);}
.topbar .ttl{flex:1;font-weight:700;font-size:17px;color:var(--ink);letter-spacing:-0.01em;line-height:1.15;}
.brandband{display:flex;align-items:center;justify-content:center;padding:12px;background:#fff;border-bottom:1px solid var(--line);}
.brandband img{max-height:56px;max-width:90%;border-radius:10px;display:block;}

/* content */
.wrap{flex:1;padding:18px 15px 60px;}
.h1{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;margin:0 0 4px;line-height:1.15;}
.sub{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 16px;}
.eyebrow{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:0 0 4px;}
.sec{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:20px 0 9px;}

/* home grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tile{background:#fff;border:1px solid var(--line);border-top:4px solid var(--catA);border-radius:12px;padding:14px 14px;
  text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:5px;min-height:78px;justify-content:center;transition:box-shadow .15s,transform .12s;}
.tile:hover{box-shadow:0 6px 18px rgba(30,42,59,.09);transform:translateY(-1px);}
.grid .tile:nth-child(4n+2){border-top-color:var(--catB);}
.grid .tile:nth-child(4n+3){border-top-color:var(--catC);}
.grid .tile:nth-child(4n+4){border-top-color:var(--catD);}
.tile .ic{width:42px;height:42px;border-radius:10px;background:var(--accent-050);display:flex;align-items:center;justify-content:center;font-size:20px;}
.tile .tl{font-weight:700;color:var(--ink);font-size:14.5px;letter-spacing:-0.01em;line-height:1.2;}
.tile .td{font-size:11.5px;color:var(--muted);line-height:1.35;}

/* list rows */
.row{position:relative;display:block;width:100%;background:#fff;border:1px solid var(--line);border-radius:11px;
  padding:14px 38px 14px 15px;margin-bottom:9px;text-align:left;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.row:hover{box-shadow:0 4px 14px rgba(30,42,59,.07);border-color:#D4DBE4;}
.row::after{content:"\2192";position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:17px;font-weight:600;}
.row .rt{font-weight:700;color:var(--ink);font-size:14.5px;letter-spacing:-0.01em;}
.row .rs{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
.row .chev-none::after{content:none;}

/* pill banner cards (home) */
.pill{position:relative;display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-left:3px solid var(--line);
  border-radius:12px;padding:14px 38px 14px 16px;margin-bottom:10px;cursor:pointer;color:var(--ink);font-weight:700;font-size:14px;transition:box-shadow .15s;}
.pill:hover{box-shadow:0 4px 14px rgba(30,42,59,.07);}
.pill::after{content:"\2192";position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:18px;}
.pill.reserve{border-left-color:var(--reserve);}
.pill small{display:block;font-weight:500;font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;}

/* card + detail */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.card p{font-size:13.5px;line-height:1.6;color:var(--text);margin:0 0 8px;}
.orgline{display:flex;flex-wrap:wrap;gap:6px;}
.orgchip{font-size:11.5px;background:#EFF2F6;color:var(--text);border-radius:6px;padding:4px 9px;font-weight:500;}

/* treatment tier block — WHO AWaRe "choice" style */
.tier{border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;overflow:hidden;margin-bottom:12px;background:#fff;}
.tier.first{border-left-color:var(--access);}
.tier.second{border-left-color:var(--watch);}
.tier.stop{border-left-color:var(--muted);}
.tier-hd{display:flex;align-items:baseline;gap:10px;padding:11px 15px;background:#F7F9FC;border-bottom:1px solid var(--line);}
.tier-name{font-weight:800;color:var(--ink);font-size:14.5px;letter-spacing:-0.015em;}
.tier.first .tier-name{color:#1E7A46;}
.tier.second .tier-name{color:#96640F;}
.tier-when{font-size:11.5px;color:var(--muted);margin-left:auto;text-align:right;max-width:56%;line-height:1.3;font-weight:600;}
.tier-body{padding:12px 15px;}
.tier-note{font-size:12.5px;color:var(--text);line-height:1.55;}

/* option / OR / agents */
.opt{padding:2px 0;}
.opt + .opt-or{display:flex;align-items:center;gap:8px;margin:8px 0;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.08em;}
.opt-or::before,.opt-or::after{content:"";flex:1;height:1px;background:var(--line);}
.agent{display:flex;align-items:flex-start;gap:10px;padding:6px 0;}
.agent .pillico{flex:none;width:30px;height:30px;border-radius:8px;background:var(--accent-050);display:flex;align-items:center;justify-content:center;margin-top:1px;}
.agent .pillico svg{width:17px;height:17px;}
.agent .adet{flex:1;min-width:0;}
.agent .an{font-weight:700;color:var(--ink);font-size:13.5px;line-height:1.3;}
.agent .ad{font-size:12.5px;color:var(--text);margin-top:1px;font-variant-numeric:tabular-nums;}
.agent .aw{display:inline-block;margin-top:4px;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:5px;color:#fff;}
.aw.access{background:var(--access);} .aw.watch{background:var(--watch);} .aw.reserve{background:var(--reserve);} .aw.na{background:var(--na);}
/* Firstline-style AWaRe pill badge (colour-coded, capsule + label) */
.awpill{flex:none;width:52px;align-self:flex-start;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 4px;min-height:52px;}
.awpill svg{width:29px;height:16px;}
.awpill .awl{font-size:7.5px;font-weight:800;color:#fff;letter-spacing:.03em;line-height:1;text-transform:uppercase;}
.awpill.access{background:#54C76D;} .awpill.watch{background:#E6A81C;} .awpill.reserve{background:#E24A3B;} .awpill.na{background:#9AA6B2;} .awpill.unknown{background:#B7C0CC;}
.awpill-lg{width:66px;border-radius:14px;padding:11px 5px;gap:5px;min-height:64px;}
.awpill-lg svg{width:36px;height:20px;} .awpill-lg .awl{font-size:9px;}
.awpill-empty{flex:none;width:52px;}
.conn{display:inline-block;font-size:10.5px;font-weight:800;color:var(--accent);background:var(--accent-050);border-radius:6px;padding:3px 9px;margin:4px 0 4px 62px;letter-spacing:.02em;}
.opt-note{font-size:12px;color:var(--muted);line-height:1.5;margin:4px 0 2px 62px;}
/* Outpatient / Inpatient toggle */
.setseg{display:flex;gap:4px;margin:0 0 12px;background:#E9EDF3;border-radius:11px;padding:4px;}
.setseg button{flex:1;padding:10px 8px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;}
.setseg button.active{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(30,42,59,.12);}
.setseg .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.5;}
.setseg button.active .dot{opacity:1;}
/* highlighted notes / remarks box */
.notebox{background:#FFF8E6;border:1px solid #F0E0A8;border-left:4px solid #E6B800;border-radius:12px;padding:12px 15px;margin:14px 0 4px;}
.notebox-h{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#8A6D12;margin-bottom:6px;}
.notebox .remarks li{border-bottom:1px solid #F1E6C0;color:#524B33;}
.notebox .remarks li::before{background:#D9A400;}
.notebox .remarks li:last-child{border-bottom:none;}
.stat-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#7A5A12;background:#FBEFD3;border-radius:5px;padding:2px 7px;margin-left:8px;letter-spacing:.03em;vertical-align:middle;}

/* remarks */
.remarks{list-style:none;margin:0;padding:0;}
.remarks li{position:relative;padding:6px 0 6px 20px;font-size:13px;line-height:1.55;color:var(--text);border-bottom:1px solid #F0F3F7;}
.remarks li:last-child{border-bottom:none;}
.remarks li::before{content:"";position:absolute;left:3px;top:12px;width:6px;height:6px;border-radius:50%;background:var(--accent);}

/* related links */
.related{display:flex;flex-wrap:wrap;gap:8px;}
.relchip{background:var(--accent-050);color:var(--accent);border:1px solid var(--accent-line);border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;}
.relchip::after{content:" \2192";}
.duration-line{display:flex;align-items:center;gap:9px;background:var(--accent-050);border:1px solid var(--accent-line);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--ink);font-weight:600;margin-bottom:14px;}
.duration-line .dic{font-size:16px;}

/* monograph */
.mono-field{margin-bottom:12px;}
.mono-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px;}
.mono-val{font-size:13.5px;color:var(--text);line-height:1.55;}
.mono-hd{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.mono-hd .pillico{width:40px;height:40px;border-radius:10px;background:var(--accent-050);display:flex;align-items:center;justify-content:center;flex:none;}
.mono-hd .pillico svg{width:22px;height:22px;}

/* duration table */
.dtab{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:11px;overflow:hidden;font-size:12.5px;}
.dtab th{background:#EFF2F6;color:var(--ink);text-align:left;padding:9px 11px;font-size:11px;font-weight:700;}
.dtab td{padding:9px 11px;border-top:1px solid var(--line);color:var(--text);vertical-align:top;}
.dtab td.d{font-weight:700;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums;}

/* checklist */
.chk{list-style:none;margin:0;padding:0;}
.chk li{position:relative;padding:9px 0 9px 26px;font-size:13px;color:var(--text);border-bottom:1px solid #F0F3F7;line-height:1.45;}
.chk li:last-child{border-bottom:none;}
.chk li::before{content:"";position:absolute;left:0;top:10px;width:15px;height:15px;border:1.5px solid var(--accent);border-radius:4px;}

/* search */
.search{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff no-repeat;margin-bottom:14px;font-family:inherit;}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,62,236,.14);}

.disclaimer{font-size:10.5px;color:var(--muted);line-height:1.55;text-align:center;margin-top:26px;padding:0 8px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 12px;}

@media(prefers-reduced-motion:reduce){*{transition:none!important;}}

/* ===== editor ===== */
.ed-fab{position:fixed;right:16px;bottom:16px;z-index:9000;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 6px 18px rgba(79,62,236,.4);}
.ed-overlay{position:fixed;inset:0;z-index:9100;background:var(--bg);display:flex;flex-direction:column;max-width:720px;margin:0 auto;}
.ed-hd{background:#fff;border-bottom:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;gap:10px;}
.ed-hd h2{margin:0;flex:1;font-size:16px;color:var(--ink);font-weight:800;}
.ed-x{background:#EFF2F6;border:none;border-radius:8px;width:34px;height:34px;font-size:15px;cursor:pointer;color:var(--ink);}
.ed-note2{background:var(--accent-050);color:#31306B;font-size:12px;padding:8px 14px;border-bottom:1px solid var(--accent-line);line-height:1.45;}
.ed-body{flex:1;overflow:auto;padding:14px;}
.ed-sel{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-weight:700;color:var(--ink);background:#fff;margin-bottom:14px;}
.ed-add{width:100%;border:1px dashed var(--accent);color:var(--accent);background:var(--accent-050);border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:10px;}
.ed-card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:10px;}
.ed-cardt{font-weight:700;color:var(--ink);font-size:14px;margin-bottom:8px;}
.ed-row{display:flex;gap:8px;flex-wrap:wrap;}
.ed-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;}
.ed-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.ed-btn.danger{color:var(--reserve);border-color:#E7C0BC;}
.ed-btn.small{padding:6px 11px;font-size:12px;}
.ed-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;margin-top:10px;}
.ed-field{display:block;margin-bottom:11px;}
.ed-lbl{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px;}
.ed-in{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff;color:var(--ink);font-family:inherit;}
textarea.ed-in{min-height:60px;resize:vertical;line-height:1.5;}
.ed-hint{font-size:11.5px;color:var(--muted);line-height:1.5;margin:6px 0;}
.ed-hint code{background:#EFF2F6;padding:1px 5px;border-radius:4px;font-size:11px;}
.ed-actions{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;border-top:1px solid var(--line);background:#fff;}
.ed-actions .ed-btn{flex:1;min-width:110px;text-align:center;}
.ed-modalbg{position:fixed;inset:0;z-index:9200;background:rgba(30,42,59,.45);display:flex;align-items:flex-end;justify-content:center;}
.ed-modal{background:#fff;width:100%;max-width:720px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0;padding:16px;}
.ed-modal h3{margin:0 0 12px;font-size:15px;color:var(--ink);}
@media(min-width:600px){.ed-modalbg{align-items:center;}.ed-modal{border-radius:16px;}}

/* culture-directed callout */
.directed{display:flex;align-items:center;gap:11px;background:var(--accent-050);border:1px solid var(--accent-line);border-radius:10px;padding:12px 14px;}
.directed .dico{width:36px;height:36px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;}
.directed .dico svg{width:19px;height:19px;}
.directed .dt{font-weight:700;color:var(--ink);font-size:13.5px;line-height:1.3;}
.directed .dd{font-size:12px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums;}

/* duration cards */
.durcard{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 2px rgba(15,60,58,.05);}
.durrow{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid #EEF1F6;}
.durrow:last-child{border-bottom:none;}
.durrow .di{flex:1;font-size:13.5px;color:var(--ink);font-weight:600;line-height:1.35;}
.durrow .dchip{flex:none;background:var(--accent-050);color:var(--accent);border:1px solid var(--accent-line);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;}

/* drug / reserved rows with AWaRe badge */
.drow{position:relative;display:flex;align-items:center;gap:12px;width:100%;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 36px 10px 10px;margin-bottom:9px;text-align:left;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.drow:hover{box-shadow:0 4px 14px rgba(30,42,59,.07);border-color:#D4DBE4;}
.drow::after{content:"\2192";position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:17px;font-weight:600;}
.drow.nolink{cursor:default;}
.drow.nolink::after{content:none;}
.drow .awpill{align-self:center;}
.drow .dinfo{flex:1;min-width:0;}
.drow .dn{font-weight:700;color:var(--ink);font-size:14px;line-height:1.25;}
.drow .dsub{font-size:11.5px;color:var(--muted);margin-top:2px;}

/* aware distribution dots on class rows */
.awdots{display:inline-flex;gap:3px;margin-left:6px;vertical-align:middle;}
.awdot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.awdot.access{background:#54C76D;} .awdot.watch{background:#E6A81C;} .awdot.reserve{background:#E24A3B;} .awdot.na{background:#9AA6B2;}

/* drug monograph — matched to reference layout */
.mo-title{font-size:21px;font-weight:700;color:#264A6E;letter-spacing:-0.01em;margin:2px 0 2px;line-height:1.15;}
.mo-cls{font-size:13px;color:#6D7389;margin:0 0 14px;}
.card.mono{padding:18px;}
.mo-field{margin-bottom:15px;}
.mo-field:last-child{margin-bottom:0;}
.mo-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.045em;color:#16324A;margin-bottom:6px;}
.mo-val{font-size:13.5px;color:#333A4A;line-height:1.55;}
.mo-val b{color:#16324A;font-weight:700;}
.chip{display:inline-block;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;border:1px solid;letter-spacing:.01em;}
.chip.aw-access{background:#EAF4EF;border-color:#BFE0CE;color:#2E8B57;}
.chip.aw-watch{background:#FBF2E0;border-color:#EDD9A8;color:#9A6B0F;}
.chip.aw-reserve{background:#FBEAE8;border-color:#F0C3BD;color:#C0392B;}
.chip.aw-na{background:#EEF1F4;border-color:#D6DCE4;color:#5E6B7A;}
.chip.bs{background:#EAF2FA;border-color:#CCDFF0;color:#2C5C8A;}

/* reserved row accent inside Antimicrobial Information */
.row.rsv{border-left:4px solid var(--reserve);}
.row.rsv .rt{color:var(--reserve);}

/* calculators */
.calc-field{margin-bottom:12px;}
.calc-field label{display:block;font-weight:700;font-size:12px;color:var(--ink);margin-bottom:5px;}
.calc-field input,.calc-field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;color:var(--ink);font-family:inherit;}
.calc-field input:focus,.calc-field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,62,236,.14);}
.calc-check{display:flex;align-items:center;padding:12px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13.5px;color:var(--ink);cursor:pointer;font-weight:600;background:#fff;line-height:1.35;}
.calc-check:hover{border-color:#D4DBE4;}
.calc-result{background:var(--accent-050);color:var(--ink);border:1px solid var(--accent-line);border-radius:14px;padding:16px;margin-top:14px;}
.calc-result .rlabel{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;font-weight:800;}
.calc-result .rvalue{font-size:24px;font-weight:800;margin-top:4px;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-0.01em;line-height:1.2;}
.calc-result .rnote{font-size:12.5px;color:var(--text);margin-top:7px;line-height:1.5;}
.calc-group-card{position:relative;background:#fff;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;padding:15px 40px 15px 16px;margin-bottom:11px;cursor:pointer;text-align:left;width:100%;transition:box-shadow .15s,transform .12s;}
.calc-group-card:hover{box-shadow:0 6px 18px rgba(30,42,59,.09);transform:translateY(-1px);}
.calc-group-card .cgt{font-weight:800;color:var(--ink);font-size:15px;letter-spacing:-0.01em;}
.calc-group-card .cgn{font-size:12px;color:var(--muted);margin-top:3px;}
.calc-group-card::after{content:"\2192";position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:17px;font-weight:600;}

/* splash */
.splash{position:fixed;inset:0;z-index:9999;background:#fff;display:flex;align-items:center;justify-content:center;transition:opacity .48s ease;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-inner{text-align:center;padding:24px;max-width:440px;}
.splash-inner img{max-width:82%;max-height:160px;border-radius:14px;display:inline-block;}
.splash-tag{margin-top:22px;font-size:15.5px;font-weight:800;color:var(--ink);line-height:1.55;letter-spacing:-0.01em;}
.splash-tag span{color:var(--accent);}
@media(prefers-reduced-motion:no-preference){.splash-inner{animation:splashin .6s ease;}}
@keyframes splashin{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ===== ported calculators (KHAMS calculator styling) ===== */
.detail-card{padding:16px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:5px;}
.field input[type=number],.field select{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,62,236,.14);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.result{background:var(--accent-050);border:1px solid var(--accent-line);border-radius:12px;padding:14px 16px;margin-top:14px;}
.result .label{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;}
.result .big{font-size:24px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-0.01em;line-height:1.2;margin-top:2px;}
.result .interp{margin-top:7px;font-size:13px;color:var(--text);line-height:1.5;}
.result-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px;}
.check{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;font-size:13.5px;color:var(--ink);line-height:1.4;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;font-weight:600;}
.check input{margin-top:2px;width:17px;height:17px;flex:none;}
.hint{font-size:12px;color:var(--muted);line-height:1.5;margin:2px 0 10px;}
.warn{background:#FDF1EC;border:1px solid #E7A98A;color:#8A3E1E;border-radius:9px;padding:10px 12px;font-size:12.5px;margin-top:12px;line-height:1.5;}
.detail-card .ref{font-size:11.5px;color:var(--muted);margin-top:14px;border-top:1px solid var(--line);padding-top:11px;line-height:1.55;}
.detail-card .ref em{font-style:italic;}

/* install banner (PWA) */
.install-banner{display:block;width:100%;text-align:left;background:var(--accent-050);border:1px solid var(--accent-line);border-radius:12px;padding:12px 14px;margin-bottom:14px;cursor:pointer;font-family:inherit;}
.install-banner.ios{cursor:default;}
.install-banner .ib-t{display:block;font-weight:800;color:var(--accent);font-size:14px;}
.install-banner .ib-s{display:block;font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}

</script><script>/* SAUC calculators — ported from the AMS Guidelines Navigator (same author).
   Helpers + CALCULATORS definitions, kept as authored. */
const $ = (sel, root=document) => root.querySelector(sel);
const num = el => { const v = parseFloat(el.value); return isNaN(v) ? null : v; };
const fmt = (n, dp=1) => (n===null||n===undefined||isNaN(n)) ? '\u2014' : n.toFixed(dp);
const ln = Math.log;
function calcOut(root, sel, html){ const e=$(sel, root); if(e) e.innerHTML = html; }

const CALCULATORS = [
{ name:"Organ Function (Renal & Hepatic)", calcs:[

  { id:"crcl", title:"Creatinine Clearance", sub:"Cockcroft–Gault (SI)", html:`
    <div class="field"><label>Sex</label>
      <select id="cg_sex"><option value="1.23">Male</option><option value="1.04">Female</option></select>
    </div>
    <div class="row2">
      <div class="field"><label>Age (years)</label><input type="number" id="cg_age" min="18" max="110"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="cg_ht" min="100"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Weight (kg)</label><input type="number" id="cg_wt" min="1"></div>
      <div class="field"><label>Serum creatinine (µmol/L)</label><input type="number" id="cg_scr" min="1"></div>
    </div>
    <div class="result">
      <div class="label">Estimated CrCl</div>
      <div class="big" id="cg_out">—</div>
      <div class="interp" id="cg_weightnote"></div>
    </div>
    <div class="ref">CrCl (mL/min) = [(140−age) × weight(kg) × k] / SCr(µmol/L), k = 1.23 (male) / 1.04 (female). Weight selection follows Winter MA, Guhr KN, Berg GM. <em>Pharmacotherapy</em> 2012;32(7):604–612 (the same reference Sanford's calculator cites): BMI &lt;18.5 → Actual Body Weight; BMI 18.5–24.9 → Ideal Body Weight (Devine); BMI ≥25 → Adjusted Body Weight = IBW + 0.4×(actual−IBW). Applied at any height, matching Sanford — verified against a Sanford test case (83y male, 130cm, 60kg, SCr 240µmol/L → 12.2 mL/min).</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const sex = $('#cg_sex',root).value==='1.23' ? 'm' : 'f', k=parseFloat($('#cg_sex',root).value);
      const age=num($('#cg_age',root)), wt=num($('#cg_wt',root)), ht=num($('#cg_ht',root)), scr=num($('#cg_scr',root));
      let r='—', note='';
      if(age!==null && wt!==null && ht!==null && scr && scr>0){
        const htIn = ht/2.54;
        const ibwVal = sex==='m' ? 50+2.3*(htIn-60) : 45.5+2.3*(htIn-60);
        const bmi = wt / Math.pow(ht/100, 2);
        let useWt;
        if(bmi < 18.5){
          useWt = wt;
          note = 'BMI '+fmt(bmi,1)+' (underweight) — using actual body weight ('+fmt(wt,1)+' kg).';
        } else if(bmi < 25){
          useWt = ibwVal;
          note = 'BMI '+fmt(bmi,1)+' (normal) — using ideal body weight ('+fmt(ibwVal,1)+' kg), not actual weight.';
        } else {
          useWt = ibwVal + 0.4*(wt-ibwVal);
          note = 'BMI '+fmt(bmi,1)+' (overweight/obese) — using adjusted body weight ('+fmt(useWt,1)+' kg; IBW '+fmt(ibwVal,1)+' kg).';
        }
        r = fmt(((140-age)*useWt*k)/scr,1)+' mL/min';
      }
      calcOut(root,'#cg_out',r);
      calcOut(root,'#cg_weightnote',note);
    });
  }},

  { id:"ibw", title:"Ideal & Adjusted Body Weight", sub:"Devine formula", html:`
    <div class="field"><label>Sex</label><select id="ibw_sex"><option value="m">Male</option><option value="f">Female</option></select></div>
    <div class="row2">
      <div class="field"><label>Height (cm)</label><input type="number" id="ibw_ht" min="100"></div>
      <div class="field"><label>Actual weight (kg) — optional</label><input type="number" id="ibw_wt"></div>
    </div>
    <div class="result">
      <div class="result-row"><span class="label">Ideal Body Weight</span><span id="ibw_out">—</span></div>

      <div class="interp" id="ibw_note"></div>
    </div>
    <div class="ref">Devine: male 50 + 2.3×(height in − 60); female 45.5 + 2.3×(height in − 60). ABW = IBW + 0.4×(actual − IBW), used for dosing weight only when actual weight is &gt;20% above IBW.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const sex=$('#ibw_sex',root).value, ht=num($('#ibw_ht',root)), wt=num($('#ibw_wt',root));
      let ibwOut='—', abwOut='—', note='';
      if(ht!==null){

        if(ht<152) note='Height below 152 cm — Devine formula is unreliable here; use clinical judgement.';
        if(wt!==null){
          if(wt>1.2*ibwVal){ abwOut = fmt(ibwVal+0.4*(wt-ibwVal),1)+' kg'; note += (note?' ':'')+'Actual weight is &gt;20% above IBW — adjusted weight generally preferred for dosing.'; }
          else abwOut = fmt(wt,1)+' kg (= actual weight)';

  { id:"bmi", title:"BMI (Body Mass Index)", sub:"", html:`
    <div class="row2">
      <div class="field"><label>Weight (kg)</label><input type="number" id="bmi_wt"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="bmi_ht"></div>

    <div class="result"><div class="label">BMI</div><div class="big" id="bmi_out">—</div><div class="interp" id="bmi_band"></div></div>
    <div class="ref">WHO bands: &lt;18.5 underweight · 18.5–24.9 normal · 25–29.9 overweight · 30–34.9 obese I · 35–39.9 obese II · ≥40 obese III.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const wt=num($('#bmi_wt',root)), ht=num($('#bmi_ht',root));
      let r='—', band='';
      if(wt!==null && ht){ const b=wt/Math.pow(ht/100,2); r=fmt(b,1); band = b<18.5?'Underweight':b<25?'Normal':b<30?'Overweight':b<35?'Obese class I':b<40?'Obese class II':'Obese class III'; }

  { id:"childpugh", title:"Child-Pugh Score", sub:"Hepatic impairment", html:`
    <div class="field"><label>Bilirubin (µmol/L)</label><select id="cp_bili"><option value="1">&lt; 34 (1 pt)</option><option value="2">34–50 (2 pt)</option><option value="3">&gt; 50 (3 pt)</option></select></div>
    <div class="field"><label>Albumin (g/L)</label><select id="cp_alb"><option value="1">&gt; 35 (1 pt)</option><option value="2">28–35 (2 pt)</option><option value="3">&lt; 28 (3 pt)</option></select></div>
    <div class="field"><label>INR</label><select id="cp_inr"><option value="1">&lt; 1.7 (1 pt)</option><option value="2">1.7–2.3 (2 pt)</option><option value="3">&gt; 2.3 (3 pt)</option></select></div>
    <div class="field"><label>Ascites</label><select id="cp_asc"><option value="1">None (1 pt)</option><option value="2">Mild (2 pt)</option><option value="3">Moderate–severe (3 pt)</option></select></div>
    <div class="field"><label>Encephalopathy</label><select id="cp_enc"><option value="1">None (1 pt)</option><option value="2">Grade 1–2 (2 pt)</option><option value="3">Grade 3–4 (3 pt)</option></select></div>
    <div class="result"><div class="label">Child-Pugh Score</div><div class="big" id="cp_out">—</div><div class="interp" id="cp_class"></div></div>
    <div class="ref">Class A (5–6): compensated. Class B (7–9): significant compromise. Class C (10–15): decompensated — dose-reduce or avoid hepatically-cleared antimicrobials; consult pharmacy.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const ids=['cp_bili','cp_alb','cp_inr','cp_asc','cp_enc'];
      const total = ids.reduce((s,id)=>s+parseInt($('#'+id,root).value),0);
      calcOut(root,'#cp_out', total);
      calcOut(root,'#cp_class', total<=6?'Class A':total<=9?'Class B':'Class C');
    });
  }},

  { id:"meld", title:"MELD Score", sub:"Classic MELD — general severity estimate", html:`
    <div class="field"><label>Bilirubin (µmol/L)</label><input type="number" id="md_bili"></div>
    <div class="field"><label>INR</label><input type="number" step="0.01" id="md_inr"></div>
    <div class="field"><label>Creatinine (µmol/L)</label><input type="number" id="md_cr"></div>
    <div class="check"><input type="checkbox" id="md_dialysis"><label for="md_dialysis">Dialysis ≥2× in past week, or CVVHD ≥24h</label></div>
    <div class="result"><div class="label">MELD Score</div><div class="big" id="md_out">—</div></div>
    <div class="warn">Coefficients are calibrated in mg/dL — inputs here are converted internally (µmol/L ÷ 17.1 for bilirubin, ÷ 88.4 for creatinine). All values floored at 1.0 mg/dL; creatinine capped at 4.0 mg/dL (or set to 4.0 if on dialysis/CVVHD). Score bounded 6–40.</div>
    <div class="ref">Classic/original MELD, shown for reference only. UNOS transplant allocation now uses MELD-Na / MELD 3.0.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const bili=num($('#md_bili',root)), inr=num($('#md_inr',root)), cr=num($('#md_cr',root));
      const dialysis=$('#md_dialysis',root).checked;
      let r='—';
      if(bili!==null && inr!==null && cr!==null){
        const bili_mgdl=Math.max(bili/17.1,1.0);
        const inr_v=Math.max(inr,1.0);
        let cr_mgdl = dialysis?4.0:Math.max(cr/88.4,1.0);
        cr_mgdl=Math.min(cr_mgdl,4.0);
        let score=3.78*ln(bili_mgdl)+11.2*ln(inr_v)+9.57*ln(cr_mgdl)+6.43;
        score=Math.round(score); score=Math.max(6,Math.min(40,score));
        r=score;
      }
      calcOut(root,'#md_out', r);
    });
  }}

]},

{ name:"Antibiotic Dosing", calcs:[

  { id:"vancoppx", title:"Vancomycin — Surgical Prophylaxis", sub:"Restricted drug", html:`

  { id:"vancoauc", title:"Vancomycin AUC₂₄", sub:"Peak/trough method — restricted drug", html:`
    <div class="warn" style="margin-top:2px;margin-bottom:16px">Steady-state levels only, drawn during the same dosing interval. Leave T1/T2 blank for idealized timing (peak at end of infusion, trough right before next dose), or fill them in for irregular draw times — same field layout as Sanford's AUC calculator (T1/T2 = hours from <strong>start of infusion</strong>, not end).</div>
    <div class="field"><label>Each Dose (mg)</label><input type="number" id="va_dose" placeholder="e.g. 1000–1500"></div>
    <div class="row2">
      <div class="field"><label>Dosing Interval</label>
        <select id="va_tau">
          <option value="">— select —</option>
          <option value="6">6 hours</option>
          <option value="8">8 hours</option>
          <option value="12">12 hours</option>
          <option value="18">18 hours</option>
          <option value="24">24 hours (1 day)</option>
          <option value="36">36 hours (1.5 days)</option>
          <option value="48">48 hours (2 days)</option>
          <option value="60">60 hours (2.5 days)</option>
          <option value="72">72 hours (3 days)</option>
          <option value="96">96 hours (4 days)</option>
          <option value="120">120 hours (5 days)</option>
        </select>
      </div>
      <div class="field"><label>Duration of Infusion</label>
        <select id="va_tinf">
          <option value="">— select —</option>
          <option value="0.5">30 min</option>
          <option value="0.75">45 min</option>
          <option value="1">1 hour</option>
          <option value="1.25">1 hour 15 min</option>
          <option value="1.5">1 hour 30 min</option>
          <option value="1.75">1 hour 45 min</option>
          <option value="2">2 hours</option>
          <option value="2.25">2 hours 15 min</option>
          <option value="2.5">2 hours 30 min</option>
          <option value="2.75">2 hours 45 min</option>
          <option value="3">3 hours</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Measured Peak Concentration (µg/mL)</label><input type="number" step="0.1" id="va_cmax"></div>
      <div class="field"><label>T1 — time from start of infusion to peak draw (hr)</label><input type="number" step="0.1" id="va_tpeak" placeholder="optional — defaults to end of infusion"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Measured Trough Concentration (µg/mL)</label><input type="number" step="0.1" id="va_cmin"></div>
      <div class="field"><label>T2 — time from start of infusion to trough draw (hr)</label><input type="number" step="0.1" id="va_ttrough" placeholder="optional — defaults to right before next dose"></div>
    </div>
    <div class="result">
      <div class="result-row"><span class="label">AUC₂₄</span><span class="big" id="va_auc">—</span></div>
      <div class="result-row"><span class="label">t½</span><span id="va_thalf">—</span></div>
      <div class="result-row" id="va_extraprow" style="display:none"><span class="label">Extrapolated true peak/trough</span><span id="va_extrap">—</span></div>
      <div class="result-row" id="va_clrow" style="display:none"><span class="label">Estimated CL / Vd</span><span id="va_cl">—</span></div>
      <div class="interp" id="va_interp"></div>
    </div>
    <div class="ref">Leaving T1/T2 blank assumes idealized timing (peak exactly at end of infusion, trough exactly before the next dose) — identical to the simple two-level method. Filling them in back-extrapolates the true end-of-infusion peak and forward-extrapolates the true pre-dose trough using ke calculated from the actual elapsed time between draws, then applies the same trapezoidal method: AUC(inf)=Tinf×(Cmax,true+Cmin,true)/2, AUC(elim)=(Cmax,true−Cmin,true)/ke, AUC24=[AUC(inf)+AUC(elim)]×24/τ. Target 400–600 mg·hr/L.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const dose=num($('#va_dose',root)), tinf=num($('#va_tinf',root)), tau=num($('#va_tau',root)), cmax=num($('#va_cmax',root)), cmin=num($('#va_cmin',root));
      const tPeakIn=num($('#va_tpeak',root)), tTroughIn=num($('#va_ttrough',root));
      let aucOut='—', thalfOut='—', interp='', extrapOut='—', clOut='—'; let showExtrap=false, showCl=false;

      if(tinf!==null && tau!==null && cmax!==null && cmin!==null && cmax>cmin && cmin>0 && tau>tinf){
        const tPeak = tPeakIn!==null ? tPeakIn : tinf;
        const tTrough = tTroughIn!==null ? tTroughIn : tau;

        if(tPeak >= tinf - 1e-9 && tTrough > tPeak && tTrough <= tau + 1e-9){
          const dt = tTrough - tPeak;
          const ke = (ln(cmax)-ln(cmin)) / dt;
          const thalf = 0.693/ke;

          const t1 = tPeak - tinf;              // time from infusion end to peak draw
          const cmaxTrue = cmax * Math.exp(ke*t1);
          const t2 = tau - tTrough;              // time from trough draw to next dose
          const cminTrue = cmin * Math.exp(-ke*t2);

          const aucInf = tinf*(cmaxTrue+cminTrue)/2;
          const aucElim = (cmaxTrue-cminTrue)/ke;
          const aucTau = aucInf+aucElim;
          const auc24 = aucTau*(24/tau);

          aucOut=fmt(auc24,0)+' mg·hr/L'; thalfOut=fmt(thalf,1)+' hr';
          interp = auc24<400?'<strong>Below target</strong> — likely subtherapeutic.':auc24<=600?'<strong>Within target</strong> (400–600).':'<strong>Above target</strong> — nephrotoxicity risk.';

          if(tPeakIn!==null || tTroughIn!==null){
            showExtrap = true;
            extrapOut = 'Peak '+fmt(cmaxTrue,1)+' µg/mL (measured '+fmt(cmax,1)+' at T1='+fmt(tPeak,1)+'h) · Trough '+fmt(cminTrue,1)+' µg/mL (measured '+fmt(cmin,1)+' at T2='+fmt(tTrough,1)+'h)';
          }
          if(dose!==null && dose>0){
            const cl = dose/aucTau;      // L/hr
            const vd = cl/ke;            // L
            clOut = fmt(cl,2)+' L/hr &nbsp;/&nbsp; Vd ≈ '+fmt(vd,1)+' L';
            showCl = true;
          }
        } else {
          interp = 'Check T1/T2: T1 must be at/after end of infusion, T2 must be after T1 and at/before τ.';
        }
      } else if(tinf!==null||tau!==null||cmax!==null||cmin!==null){ interp='Need Cmax &gt; Cmin &gt; 0 and τ &gt; Tinf.'; }

      calcOut(root,'#va_auc',aucOut); calcOut(root,'#va_thalf',thalfOut); calcOut(root,'#va_interp',interp);
      calcOut(root,'#va_cl',clOut);
      $('#va_clrow',root).style.display = showCl ? 'flex' : 'none';
      calcOut(root,'#va_extrap',extrapOut);
      $('#va_extraprow',root).style.display = showExtrap ? 'flex' : 'none';
    });
  }},

  { id:"colistin", title:"Colistin (Colistimethate) Dosing", sub:"Nation 2017 / Intl Consensus Guidelines — restricted drug", html:`
    <div class="warn" style="margin-top:2px;margin-bottom:16px">This uses the renal-function look-up table method (Nation et al., <em>Clin Infect Dis</em> 2017;64:565–571; International Consensus Guidelines for the Optimal Use of the Polymyxins) — the "clinician-friendly" algorithm that underlies the Sanford Guide colistin calculator, replacing the earlier continuous-formula version here. Targets Css,avg = 2 mg/L. Not for patients on renal replacement therapy (HD/CRRT) — consult ID/pharmacy for RRT-specific dosing.</div>
    <div class="row2">
      <div class="field"><label>Weight (kg)</label><input type="number" id="co_wt"></div>
      <div class="field"><label>CrCl (mL/min)</label><input type="number" id="co_crcl"></div>
    </div>
    <div class="hint" style="font-size:.78rem;color:var(--muted);margin:-6px 0 10px">Use the <strong>lower</strong> of actual or ideal body weight for the loading dose (see Ideal &amp; Adjusted Body Weight calculator).</div>
    <div class="result">
      <div class="result-row"><span class="label">Loading dose (once)</span><span class="big" id="co_load">—</span></div>
      <div class="result-row"><span class="label">Maintenance (per 12h, from 12h after loading)</span><span class="big" id="co_maint">—</span></div>
      <div class="interp" id="co_note"></div>
    </div>
    <div class="warn" id="co_warn" style="display:none"></div>
    <div class="ref">Loading dose = 4 × weight(kg), mg CBA, capped at a maximum of 300 mg CBA regardless of weight or CrCl. Confirm local practice, especially &gt;100kg. Maintenance dose is a renal-function band (not a continuous formula) targeting Css,avg 2 mg/L, derived from Nation et al. 2017. Confirm local mg CBA↔CMS↔IU conversion before administering. Restricted — ID/microbiology consult required.</div>
  `, init(root){
    const COLISTIN_BANDS = [
      {min:90, dose:182, label:"≥90"},
      {min:80, dose:172, label:"80–89"},
      {min:70, dose:149, label:"70–79"},
      {min:60, dose:139, label:"60–69"},
      {min:50, dose:122, label:"50–59"},
      {min:40, dose:109, label:"40–49"},
      {min:30, dose:99, label:"30–39"},
      {min:20, dose:86, label:"20–29"},
      {min:10, dose:79, label:"10–19"},
      {min:5, dose:73, label:"5–9"},
      {min:0, dose:66, label:"0–4"}
    ];
    root.addEventListener('input', ()=>{
      const wt=num($('#co_wt',root)), crcl=num($('#co_crcl',root));
      let loadOut='—', maintOut='—', note='', warn='';
      if(wt!==null){ let ld=4*wt, capped=ld>300; if(capped) ld=300; loadOut=fmt(ld,0)+' mg CBA'+(capped?' (max)':''); }
      if(crcl!==null && crcl>=0){
        const band = COLISTIN_BANDS.find(b => crcl>=b.min);
        maintOut = fmt(band.dose,0)+' mg CBA q12h ('+fmt(band.dose*2,0)+' mg CBA/day)';
        note = 'CrCl band: '+band.label+' mL/min.';
        if(crcl<10) warn='CrCl &lt;10 mL/min and not on RRT: dosing is high-risk at this renal function — confirm with ID/pharmacy. This table does not apply to patients receiving hemodialysis or CRRT.';
      }
      calcOut(root,'#co_load',loadOut); calcOut(root,'#co_maint',maintOut); calcOut(root,'#co_note',note);
      const w=$('#co_warn',root); w.style.display=warn?'block':'none'; w.innerHTML=warn;
    });
  }}

]},

{ name:"Severity & Risk Scores", calcs:[

  { id:"curb65", title:"CURB-65", sub:"Pneumonia severity", html:`

  { id:"qsofa", title:"qSOFA", sub:"Quick SOFA", html:`

  { id:"centor", title:"Modified Centor (McIsaac)", sub:"Strep pharyngitis", html:`
    <div class="check"><input type="checkbox" id="ct_ex"><label for="ct_ex">Tonsillar exudate</label></div>
    <div class="check"><input type="checkbox" id="ct_ln"><label for="ct_ln">Tender anterior cervical lymphadenopathy</label></div>

      calcOut(root,'#ct_int', s<=0?'Very low risk.':s===1?'Low risk.':s===2?'Intermediate — test.':s===3?'Moderate-high — test.':'High risk — test or consider empiric treatment.');
    });
  }},

  { id:"candida", title:"Candida Score (ICU)", sub:"Leon et al. 2006", html:`
    <div class="check"><input type="checkbox" id="cs_multi"><label for="cs_multi">Multifocal Candida colonization (+1)</label></div>
    <div class="check"><input type="checkbox" id="cs_surg"><label for="cs_surg">Surgery on ICU admission (+1)</label></div>
    <div class="check"><input type="checkbox" id="cs_sepsis"><label for="cs_sepsis">Severe sepsis (+2)</label></div>
    <div class="check"><input type="checkbox" id="cs_tpn"><label for="cs_tpn">Total parenteral nutrition (+1)</label></div>
    <div class="result"><div class="label">Candida Score</div><div class="big" id="cs_out">—</div><div class="interp" id="cs_int"></div></div>
    <div class="ref">Score ≥3 suggests increased invasive candidiasis risk.</div>
  `, init(root){
    root.addEventListener('change', ()=>{

  { id:"news2", title:"NEWS2", sub:"National Early Warning Score 2", html:`

  { id:"psi", title:"PSI / PORT Score", sub:"Pneumonia Severity Index", html:`
    <div class="field"><label>Sex</label><select id="ps_sex"><option value="m">Male</option><option value="f">Female</option></select></div>

    <div class="check"><input type="checkbox" id="ps_liv"><label for="ps_liv">Liver disease (+20)</label></div>
    <div class="check"><input type="checkbox" id="ps_chf"><label for="ps_chf">CHF (+10)</label></div>
    <div class="check"><input type="checkbox" id="ps_cvd"><label for="ps_cvd">Cerebrovascular disease (+10)</label></div>
    <div class="check"><input type="checkbox" id="ps_ren"><label for="ps_ren">Renal disease (+10)</label></div>
    <div class="check"><input type="checkbox" id="ps_ams"><label for="ps_ams">Altered mental status (+20)</label></div>
    <div class="check"><input type="checkbox" id="ps_rr"><label for="ps_rr">RR ≥ 30/min (+20)</label></div>
    <div class="check"><input type="checkbox" id="ps_sbp"><label for="ps_sbp">SBP &lt; 90 mmHg (+20)</label></div>
    <div class="check"><input type="checkbox" id="ps_temp"><label for="ps_temp">Temp &lt; 35°C or ≥ 40°C (+15)</label></div>
    <div class="check"><input type="checkbox" id="ps_pulse"><label for="ps_pulse">Pulse ≥ 125/min (+10)</label></div>
    <div class="check"><input type="checkbox" id="ps_ph"><label for="ps_ph">Arterial pH &lt; 7.35 (+30)</label></div>
    <div class="check"><input type="checkbox" id="ps_urea"><label for="ps_urea">Urea ≥ 11 mmol/L (+20)</label></div>
    <div class="check"><input type="checkbox" id="ps_na"><label for="ps_na">Sodium &lt; 130 mmol/L (+20)</label></div>
    <div class="check"><input type="checkbox" id="ps_glu"><label for="ps_glu">Glucose ≥ 14 mmol/L (+10)</label></div>
    <div class="check"><input type="checkbox" id="ps_hct"><label for="ps_hct">Hematocrit &lt; 30% (+10)</label></div>
    <div class="check"><input type="checkbox" id="ps_pao2"><label for="ps_pao2">PaO₂ &lt; 8.0 kPa or SpO₂ &lt; 90% (+10)</label></div>
    <div class="check"><input type="checkbox" id="ps_eff"><label for="ps_eff">Pleural effusion (+10)</label></div>
    <div class="result"><div class="label">PSI Score</div><div class="big" id="ps_out">—</div><div class="interp" id="ps_int"></div></div>
    <div class="ref">Class I (age &lt;50, no comorbidities/findings above): outpatient. II ≤70. III 71–90. IV 91–130. V &gt;130.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const sex=$('#ps_sex',root).value, age=num($('#ps_age',root));
      if(age===null){ calcOut(root,'#ps_out','—'); calcOut(root,'#ps_int',''); return; }
      let s = sex==='m'?age:age-10;
      const box=id=>$('#'+id,root).checked;
      const pts={ps_nh:10,ps_neo:30,ps_liv:20,ps_chf:10,ps_cvd:10,ps_ren:10,ps_ams:20,ps_rr:20,ps_sbp:20,ps_temp:15,ps_pulse:10,ps_ph:30,ps_urea:20,ps_na:20,ps_glu:10,ps_hct:10,ps_pao2:10,ps_eff:10};
      Object.keys(pts).forEach(id=>{ if(box(id)) s+=pts[id]; });
      calcOut(root,'#ps_out', s);

]},

      else r='Does not meet criteria for possible/definite IE';

    });
  }}

]}
];
</script><script>/* ================= SAUC app engine ================= */
(function(){

function awPill(aw,big){var cls='awpill'+(big?' awpill-lg':'');if(!aw)return '<div class="'+cls+' unknown">'+WPILL+'</div>';return '<div class="'+cls+' '+aw+'">'+WPILL+'<span class="awl">'+AW_LABEL[aw]+'</span></div>';}

/* ---- data store (defaults from data.js) ---- */

  RISK_MDRO:RISK_MDRO,RISK_CUTI:RISK_CUTI,DRUGS:DRUGS,AWARE_MAP:AWARE_MAP};

var DB=clone(DEFAULTS);
try{var raw=localStorage.getItem(LS);if(raw){var ov=JSON.parse(raw);Object.keys(ov).forEach(function(k){if(ov[k]!=null)DB[k]=ov[k];});}}catch(e){}
var HISTORY=[];
function pushHistory(){HISTORY.push(clone(DB));if(HISTORY.length>40)HISTORY.shift();updateUndo();}
function save(){try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){}}

/* expose for editor */
window.SAUC={get DB(){return DB;},DEFAULTS:DEFAULTS,pushHistory:pushHistory,commit:commit,undo:undo,
  resetAll:resetAll,clone:clone,render:function(){render();},go:go,save:save,LS:LS};

/* ---- aware lookup ---- */
function norm(n){return (n||'').toLowerCase().replace(/\(.*?\)/g,'').replace(/[\u2013\u2014]/g,'-').replace(/\s+/g,' ').trim();}
function awareOf(name){
  if(!name||name.indexOf('(')===0||name.indexOf('per culture')>=0)return null;
  var k=norm(name);
  if(DB.AWARE_MAP[k])return DB.AWARE_MAP[k];
  // try each drug in DB
  var f=DB.DRUGS.filter(function(d){var dn=norm(d.n);return dn===k||dn.indexOf(k)>=0||k.indexOf(dn)>=0;});
  if(f.length)return f[0].aware;
  var first=k.split(' ')[0];
  if(DB.AWARE_MAP[first])return DB.AWARE_MAP[first];
  return null;
}
function drugByName(name){
  var k=norm(name);
  var f=DB.DRUGS.filter(function(d){var dn=norm(d.n);return dn===k||dn.indexOf(k)>=0||k.indexOf(dn)>=0;});
  return f[0]||null;

var AW_LABEL={access:'Access',watch:'Watch',reserve:'Reserve',na:'N/A'};

function categoryOf(d){var c=(d.cls||'').toLowerCase();

  if(c.indexOf('antiviral')>=0||c.indexOf('nucleoside')>=0)return'Antivirals';

function classLabel(cls){return (cls||'Other').replace(/\s*\(antifungal\)/i,'');}
var CAT_ORDER=['Antibacterials','Antifungals','Antivirals'];
var CAT_EMOJI={Antibacterials:'\uD83E\uDDEB',Antifungals:'\uD83C\uDF44',Antivirals:'\uD83E\uDDA0'};

/* ---- navigation ---- */
var stack=[]; // {screen,params,title}
function cloneStack(){var a=[];for(var i=0;i<stack.length;i++){a.push({screen:stack[i].screen,params:stack[i].params,title:stack[i].title});}return a;}
function syncHistory(replace){try{var st={__sauc:cloneStack()};if(replace)history.replaceState(st,'');else history.pushState(st,'');}catch(e){}}
function go(screen,params,title,replace){
  if(replace)stack[stack.length-1]={screen:screen,params:params||{},title:title||''};
  else stack.push({screen:screen,params:params||{},title:title||''});
  syncHistory(replace);
  window.scrollTo(0,0);render();
}
function back(){if(stack.length>1)history.back();}
function cur(){return stack[stack.length-1];}
/* install prompt capture (Android/desktop) */
try{window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();window.__deferredPrompt=e;var h=cur();if(h&&h.screen==='home')render();});
window.addEventListener('appinstalled',function(){window.__deferredPrompt=null;});}catch(e){}

/* ---- helpers ---- */
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
function condById(id){return DB.CONDITIONS.filter(function(c){return c.id===id;})[0];}

  ({home:rHome,guidelines:rGuidelines,group:rGroup,cond:rCond,drugs:rDrugs,drugcat:rDrugCat,drugclass:rDrugClass,drug:rDrug,durations:rDur,reserved:rReserved,risk:rRisk,calchome:rCalcHome,calcgroup:rCalcGroup,calc:rCalc}[s.screen]||rHome)(wrap,s.params);

function tierClass(t){var l=(t||'').toLowerCase();if(l.indexOf('first')>=0)return'first';if(l.indexOf('second')>=0)return'second';if(l.indexOf('do not')>=0||l.indexOf('not routinely')>=0)return'stop';return'info';}

    var ta=el('textarea',{class:'ed-in',style:'min-height:180px;font-family:ui-monospace,monospace;font-size:12px'});
    ta.value=JSON.stringify(draft.blocks||[],null,1);box.appendChild(ta);
    box.appendChild(el('label',{class:'ed-field'},[el('span',{class:'ed-lbl',text:'Available drug IDs (for reference)'}),el('div',{class:'ed-hint',text:DB.DRUGS.map(function(d){return d.n;}).slice(0,60).join(' · ')})]));
    box.appendChild(saveRow(function(){
      try{draft.blocks=JSON.parse(ta.value);}catch(e){alert('Treatment blocks JSON is invalid: '+e.message);return false;}
      DB.CONDITIONS[i]=draft;return true;
    },bg,isNew,kind,i));
  } else if(kind==='drug'){
    DRUG_FIELDS.forEach(function(f){box.appendChild(ctrl(f,draft[f[0]],function(v){draft[f[0]]=v;}));});
    box.appendChild(saveRow(function(){DB.DRUGS[i]=draft;return true;},bg,isNew,kind,i));
  } else if(kind==='group'){
    box.appendChild(ctrl(['name','Name','input'],draft.name,function(v){draft.name=v;}));
    box.appendChild(ctrl(['emoji','Emoji','input'],draft.emoji,function(v){draft.emoji=v;}));
    box.appendChild(ctrl(['desc','Description','input'],draft.desc,function(v){draft.desc=v;}));
    box.appendChild(saveRow(function(){DB.GROUPS[i]=draft;return true;},bg,isNew,kind,i));
  }
  bg.appendChild(box);bg.addEventListener('click',function(e){if(e.target===bg)closeModal(bg,isNew,kind,i);});document.body.appendChild(bg);
}
function saveRow(apply,bg,isNew,kind,i){
  return el('div',{class:'ed-row',style:'margin-top:12px'},[
    el('button',{class:'ed-btn primary',text:'Save',onclick:function(){S().pushHistory();if(apply()!==false){S().commit();bg.remove();drawList();}else{S().undo&&S().undo;} }}),
    el('button',{class:'ed-btn',text:'Cancel',onclick:function(){closeModal(bg,isNew,kind,i);}})
  ]);
}
function closeModal(bg,isNew,kind,i){
  if(isNew){var DB=S().DB,arr=DB[kindKey(kind)];/* remove freshly added blank */arr.splice(i,1);S().commit();drawList();}
  bg.remove();
}
function kindKey(kind){return {cond:'CONDITIONS',drug:'DRUGS',dur:'DURATIONS',group:'GROUPS'}[kind];}

function exportJSON(){var DB=S().DB;var o={};['CONDITIONS','DRUGS','DURATIONS','RESERVED','RISK_MDRO','RISK_CUTI','GROUPS','AWARE_MAP'].forEach(function(k){o[k]=DB[k];});download('sauc-content.json',JSON.stringify(o,null,2),'application/json');}
function importJSON(){var f=el('input',{type:'file',accept:'.json',style:'display:none'});f.addEventListener('change',function(){var file=f.files&&f.files[0];if(!file)return;var r=new FileReader();r.onload=function(){try{var data=JSON.parse(r.result);S().pushHistory();var DB=S().DB;var n=0;Object.keys(data).forEach(function(k){if(DB[k]!=null&&data[k]!=null){DB[k]=data[k];n++;}});S().commit();drawList();alert('Imported '+n+' section(s).');}catch(e){alert('Invalid JSON.');}};r.readAsText(file);});document.body.appendChild(f);f.click();setTimeout(function(){f.remove();},1000);}

function gate(){
  var bg=el('div',{class:'ed-modalbg'});var inp=el('input',{class:'ed-in',type:'password',placeholder:'Passcode'});
  var err=el('p',{class:'ed-hint',style:'color:var(--reserve);display:none',text:'Incorrect passcode.'});
  function tryit(){if(inp.value===PIN){unlocked=true;bg.remove();open();}else{err.style.display='block';inp.value='';inp.focus();}}
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')tryit();});
  var box=el('div',{class:'ed-modal'},[el('h3',{text:'Edit content'}),
    el('p',{class:'ed-hint',text:'Enter the editor passcode. Edits change clinical guidance — proceed carefully.'}),
    el('label',{class:'ed-field'},[el('span',{class:'ed-lbl',text:'Passcode'}),inp]),err,
    el('div',{class:'ed-row',style:'margin-top:8px'},[el('button',{class:'ed-btn primary',text:'Unlock',onclick:tryit}),el('button',{class:'ed-btn',text:'Cancel',onclick:function(){bg.remove();}})])]);
  bg.appendChild(box);document.body.appendChild(bg);inp.focus();
}

function mountFab(){var fab=el('button',{class:'ed-fab',title:'Edit content',text:'\u270F\uFE0F',onclick:function(){unlocked?open():gate();}});document.body.appendChild(fab);}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mountFab);else mountFab();
})();
</script><script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}</script></body></html>
