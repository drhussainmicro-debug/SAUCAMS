<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>SAUC Antimicrobial Guide</title>
<meta name="theme-color" content="#0B2E4F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --navy:#0B2E4F; --navy-ink:#0A2540; --bg:#F5F7FA; --line:#DDE3EA;
  --muted:#5B6B7E; --focus:#1D6FE0;
  --access:#2E9E4F; --watch:#E0A315; --reserve:#C0392B; --na:#8C97A5;
  --uti:#1D6FE0; --surg:#2E9E4F; --std:#17A2A2; --candid:#8E44AD;
  --card:#FFFFFF;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--navy-ink);
  -webkit-font-smoothing:antialiased;}
#app{max-width:720px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}

/* ---- Top bar ---- */
.topbar{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:10px 14px;
  display:flex;align-items:center;gap:10px;min-height:52px;}
.backbtn{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;width:36px;height:36px;
  font-size:18px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;}
.backbtn:focus-visible, .tile:focus-visible, button:focus-visible, .pill:focus-visible, input:focus-visible, .rowlink:focus-visible{
  outline:3px solid var(--focus); outline-offset:2px;}
.topbar-title{font-weight:700;font-size:16px;flex:1;line-height:1.2;}
.breadcrumb{font-size:11px;color:#BFD3EA;padding:0 14px 8px 14px;background:var(--navy);}
.breadcrumb span::after{content:" › ";color:#7E9CC0;}
.breadcrumb span:last-child::after{content:"";}

/* ---- Content ---- */
.content{flex:1;padding:16px 14px 40px;}
h1.pagetitle{font-size:20px;color:var(--navy-ink);font-weight:700;margin:2px 0 4px;}
p.pagesub{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.5;}

/* ---- Root grid ---- */
.banner{margin-bottom:16px;}
.pill{display:block;width:100%;text-align:left;border:none;border-radius:12px;padding:12px 14px;font-weight:700;
  font-size:14px;color:#fff;cursor:pointer;margin-bottom:8px;}
.pill.green{background:var(--access);}
.pill.red{background:var(--reserve);}
.pill small{display:block;font-weight:400;font-size:11.5px;opacity:.9;margin-top:2px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 12px;text-align:left;
  cursor:pointer;display:flex;flex-direction:column;gap:8px;min-height:104px;}
.tile .emoji{font-size:26px;}
.tile .label{font-weight:700;color:var(--navy-ink);font-size:14px;line-height:1.25;}
.tile .desc{font-size:11.5px;color:var(--muted);line-height:1.3;}

/* ---- List rows ---- */
.rowlink{display:block;width:100%;background:var(--card);border:none;border-left:5px solid var(--line);
  border-radius:10px;padding:13px 14px;margin-bottom:9px;text-align:left;cursor:pointer;
  box-shadow:0 1px 2px rgba(10,37,64,.05);}
.rowlink .rt{font-weight:700;color:var(--navy-ink);font-size:14.5px;}
.rowlink .rs{font-size:12px;color:var(--muted);margin-top:3px;}
.rowlink .rtag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.02em;padding:2px 7px;
  border-radius:20px;margin-top:6px;}

.section-emoji-tile .tile{border-left:none;}

/* accent-bordered category tiles used inside Guidelines top level (still emoji) */
.icon-tile{display:flex;align-items:center;gap:10px;}

/* ---- Cards / detail content ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.card.accent{border-left:5px solid var(--navy);}
.card h2{font-size:15px;color:var(--navy-ink);font-weight:700;margin:0 0 10px;text-transform:none;}
.card h3{font-size:12.5px;color:var(--navy-ink);font-weight:700;margin:14px 0 6px;text-transform:uppercase;
  letter-spacing:.03em;}
.card h3:first-child{margin-top:0;}
.card p{font-size:13.5px;line-height:1.55;margin:0 0 8px;color:#28394C;}
.card ul{margin:0 0 8px;padding-left:18px;}
.card li{font-size:13.5px;line-height:1.55;color:#28394C;margin-bottom:4px;}
.field-label{font-weight:700;color:var(--navy-ink);font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;
  margin:12px 0 4px;}
.field-label:first-child{margin-top:0;}
.field-value{font-size:13.5px;color:#28394C;line-height:1.55;}
.dosebox{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:6px 0;}
.dosebox .dtitle{font-weight:700;color:var(--navy-ink);font-size:12.5px;margin-bottom:3px;}
.remarknote{background:#FFF7E8;border:1px solid #F0DBA6;border-radius:10px;padding:10px 12px;font-size:12.5px;
  color:#6B4E10;line-height:1.5;margin-top:8px;}
.flagnote{background:#EAF1FB;border:1px solid #C6D9F2;border-radius:10px;padding:10px 12px;font-size:12px;
  color:#1D3A5F;line-height:1.5;margin:10px 0;}
.flagnote b{color:var(--navy-ink);}

/* badges */
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;letter-spacing:.02em;}
.badge.access{background:var(--access);}
.badge.watch{background:var(--watch);color:#3A2A00;}
.badge.reserve{background:var(--reserve);}
.badge.na{background:var(--na);}

/* tables */
table.dtab{width:100%;border-collapse:collapse;font-size:12.5px;margin:8px 0;}
table.dtab th{background:var(--navy);color:#fff;padding:7px 8px;text-align:left;font-size:11px;}
table.dtab td{padding:7px 8px;border-bottom:1px solid var(--line);color:#28394C;}
table.dtab tr:nth-child(even) td{background:#FAFBFD;}

/* calculators */
.calc-field{margin-bottom:12px;}
.calc-field label{display:block;font-weight:700;font-size:12px;color:var(--navy-ink);margin-bottom:5px;}
.calc-field input,.calc-field select{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;
  font-size:14px;background:#fff;color:var(--navy-ink);}
.calc-result{background:var(--navy);color:#fff;border-radius:12px;padding:14px;margin-top:14px;}
.calc-result .rlabel{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.04em;}
.calc-result .rvalue{font-size:22px;font-weight:700;margin-top:4px;}
.calc-result .rnote{font-size:11.5px;opacity:.85;margin-top:6px;line-height:1.4;}
.seg{display:flex;gap:8px;margin-bottom:12px;}
.seg button{flex:1;padding:9px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:12.5px;
  font-weight:700;color:var(--muted);cursor:pointer;}
.seg button.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* interaction checker */
.chipzone{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:40px;}
.chip{background:var(--navy);color:#fff;border-radius:20px;padding:6px 12px;font-size:12.5px;display:flex;
  align-items:center;gap:6px;}
.chip button{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;padding:0;line-height:1;}
.addbar{display:flex;gap:8px;margin-bottom:14px;}
.addbar select{flex:1;padding:10px;border-radius:9px;border:1px solid var(--line);font-size:13px;}
.addbar button{background:var(--focus);color:#fff;border:none;border-radius:9px;padding:0 16px;font-weight:700;
  font-size:13px;cursor:pointer;}
.interaction-hit{border-left:5px solid var(--reserve);}
.interaction-hit.moderate{border-left-color:var(--watch);}
.empty-state{text-align:center;padding:30px 14px;color:var(--muted);font-size:13px;}
.empty-state .big{font-size:32px;margin-bottom:8px;}

/* search */
.searchbox{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;
  margin-bottom:14px;background:#fff;}

/* footer disclaimer */
.disclaimer{font-size:10.5px;color:var(--muted);line-height:1.5;text-align:center;margin-top:24px;padding:0 6px;}
a.plainlink{color:var(--focus);}

/* favorite star */
.favbtn{background:none;border:none;font-size:22px;color:#C9D3DE;cursor:pointer;line-height:1;padding:2px;flex:none;}
.favbtn.active{color:#E0A315;}

/* offline banner */
.offlinebar{background:#5B6B7E;color:#fff;text-align:center;font-size:12px;padding:6px 10px;}

/* install button */
.installbtn{display:none;width:100%;background:var(--focus);color:#fff;border:none;border-radius:12px;
  padding:12px 14px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:14px;}
.installbtn.show{display:block;}

/* hero */
.herowrap{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.herowrap img{width:44px;height:44px;border-radius:10px;object-fit:cover;flex:none;}
.herotag{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}

/* search */
.search-overlay-input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;
  margin-bottom:6px;background:#fff;}
.search-clear{display:flex;justify-content:flex-end;margin-bottom:10px;}
.search-clear button{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;}
.search-groupname{margin:16px 0 8px;color:var(--navy-ink);font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="backbtn" id="backBtn" aria-label="Back" style="visibility:hidden;">&#8592;</button>
    <div class="topbar-title" id="topTitle">SAUC Antimicrobial Guide</div>
    <button class="backbtn" id="searchBtn" aria-label="Search">&#128269;</button>
  </div>
  <div class="offlinebar" id="offlineBar" style="display:none;">You're offline — showing cached content</div>
  <div class="breadcrumb" id="crumb" style="display:none;"></div>
  <div class="content" id="content"></div>
</div>

<script>
/* =========================================================================
   SAUC ANTIMICROBIAL GUIDE — data layer
   Sourced verbatim/paraphrase-free from: SAUC Antibiotic Policy 2025
   (Sabah Al-Ahmad Urology Center, Kuwait MOH, created 4 May 2025)
   NOTE ON STRUCTURE: The AMS Guide build spec this app follows was written
   for a general hospital policy organized by body system with Adult/
   Pediatric tracks. SAUC's policy is a single-specialty UROLOGY document
   with NO body-system chapters and NO dedicated pediatric section, so
   "Guidelines" below is organized around the document's own condition
   groupings (UTIs, Surgical Prophylaxis, STDs, Candiduria) instead of the
   generic 8-system / Adult+Pediatric template. This deviation is
   intentional and flagged here per the build spec's own instruction to
   surface interpretation choices in-app rather than only in chat.
   ========================================================================= */

const AWARE = {access:'Access', watch:'Watch', reserve:'Reserve', na:'N/A'};

/* ---------------- Guidelines: Urinary Tract Infections ---------------- */
const UTI_CONDITIONS = [
  {
    id:'asb', title:'Asymptomatic Bacteriuria (ASB)',
    organisms:'E. coli, Klebsiella pneumoniae, Enterococcus faecalis, GBS, Pseudomonas aeruginosa, Candida spp., and others.',
    first:'No treatment indicated unless patient belongs to a risk group:\n• Pregnant women\n• Patient undergoing a urological procedure with anticipated mucosal injury/bleeding\n• Send urine C/S before elective surgeries.',
    second:'',
    remarks:'A) Pregnant woman — treat according to C/S result. Duration: 5 days. Candida in urine may represent vaginal colonization or vaginitis (contamination during specimen collection).\n\nB) Before urological procedures with anticipated mucosal injury/bleeding — treat according to C/S result. Duration: 1–5 days. Duration depends on: complexity of procedure, anticipated bleeding volume, type of microorganism (MDR vs non-MDR), presence of foreign body. Oral therapy is sufficient in most cases.'
  },
  {
    id:'unc-cystitis', title:'Acute Uncomplicated Cystitis', subtitle:'Non-pregnant woman',
    organisms:'E. coli, Klebsiella pneumoniae, Enterococcus faecalis, GBS, Candida spp.',
    first:'PO Nitrofurantoin (Macrobid) 100 mg bd — STAT',
    second:'PO Fosfomycin 3 g\nOR\nPO Amoxicillin-Clavulanic Acid 1 g bd',
    remarks:'Send properly collected urine C/S before starting antibiotics. Modify empiric Rx if patient is known to be colonized/infected by MDRO in the last 6 months.',
    duration:'3–5 days (bacterial infection); 14 days (Candida infection)'
  },
  {
    id:'recurrent-uti', title:'Recurrent UTIs', subtitle:'≥3/year OR ≥2 in last 6 months',
    organisms:'E. coli, Klebsiella pneumoniae, Proteus spp., Enterococcus faecalis, GBS, Candida spp.',
    first:'PO Nitrofurantoin (Macrobid) 50–100 mg od\nDuration: 3–6 months OR post-coital',
    second:'PO Fosfomycin 3 g every 10 days\nDuration: 3–6 months or post-coital',
    remarks:'Antimicrobial prophylaxis is ONLY indicated when behavioral modifications & non-antimicrobial measures have failed (EAU). Send urine C/S and modify prophylactic Rx according to result.\n\nDuring pregnancy: PO Cefaclor 250 mg od — duration: throughout pregnancy or post-coital.',
    duration:'3–6 months OR post-coital'
  },
  {
    id:'unc-pyelo', title:'Acute Uncomplicated Pyelonephritis', subtitle:'Non-pregnant women, no risk factors for complicated course',
    organisms:'E. coli, Klebsiella pneumoniae, Proteus spp., Enterococcus faecalis, GBS.',
    first:'PO Ciprofloxacin 500 mg bd\nOR\nIV Ciprofloxacin 400 mg bd',
    second:'STAT IV Ceftriaxone 2 g*\nThen PO Augmentin 1 g bd\nOR IV Augmentin 1.2 g bd\nOR PO/IV Cefixime 400 mg bd',
    remarks:'*EAU recommendation. Send blood & urine C/S before starting antibiotics. Consider adding empirical STAT (one dose) IV Amikacin if patient is at risk of progression to complicated course.',
    duration:'7–10 days'
  },
  {
    id:'comp-cystitis', title:'Acute Complicated Cystitis',
    organisms:'E. coli, Klebsiella pneumoniae, Proteus spp., Pseudomonas aeruginosa, Enterococcus faecalis, GBS, Candida spp.',
    first:'Out-patient: PO Nitrofurantoin (Macrobid) 500 mg bd +/- STAT PO Fosfomycin 3 g\n\nIn-patient: IV Piperacillin-Tazobactam 4.5 g tds + STAT PO Fosfomycin 3 g',
    second:'Out-patient (if allergic to 1st line): PO Levofloxacin 750 mg od + STAT PO Fosfomycin 3 g\n\nIn-patient (if allergic to 1st line): IV Levofloxacin 750 mg od + STAT PO Fosfomycin 3 g',
    remarks:'Do not use Nitrofurantoin if patient has systemic signs of infection. Check for risk factors for complicated UTI. Send properly collected urine C/S before starting antibiotics. Modify empiric Rx if patient is known to be colonized/infected by MDRO in the last 3–6 months.',
    duration:'7–10 days'
  },
  {
    id:'comp-pyelo', title:'Acute Complicated Pyelonephritis',
    organisms:'E. coli, Klebsiella pneumoniae, Proteus spp., Pseudomonas aeruginosa, Enterococcus faecalis, GBS, Candida spp.',
    first:'Hemodynamically stable & not in sepsis: IV Piperacillin-Tazobactam 4.5 g tds +/- IV Amikacin 15 mg/kg od',
    second:'Hemodynamically unstable or severe infection: IV Meropenem 2 g tds + IV Amikacin 15 mg/kg od',
    remarks:'Check for risk factors for complicated UTI. Send blood & urine C/S before starting antibiotics. Modify empirical Rx if patient is known to be colonized/infected with MDRO. Modify directed Rx according to C/S result.',
    duration:'10–14 days'
  }
];

/* ---------------- Guidelines: Surgical Prophylaxis ---------------- */
const SURG_ENTRIES = [
  {
    id:'low-risk-proc', title:'Urodynamics / Cystoscopy / Extracorporeal Shockwave Lithotripsy (ESWL)',
    organisms:'—',
    first:'Antimicrobial prophylaxis is NOT routinely indicated.*',
    second:'',
    remarks:'*EAU recommendation. If indicated, follow the prophylaxis recommendations as for other urologic procedures.'
  },
  {
    id:'tp-biopsy', title:'Transperineal Prostate Biopsy',
    organisms:'—',
    first:'No MDRO risk: IV Metronidazole 500 mg tds + IV Cefazolin 2 g tds',
    second:'MDRO risk: IV Metronidazole 500 mg tds + IV Amikacin 15 mg/kg od\n\nIf MRSA screen positive, add: STAT IV Linezolid 600 mg',
    remarks:'Avoid aminoglycosides if patient has renal impairment, and check for alternatives.'
  },
  {
    id:'general-urologic', title:'Ureteroscopy, PCNL, TURP, TURBT, Renal Tumor Ablation, Urethral/Penile Stent Fixation/Removal, Other Urologic Procedures',
    organisms:'—',
    first:'Follow recommendations A, B and C below, based on pre-op urine culture and MDRO risk/screen status.',
    second:'',
    remarks:'',
    subtable:[
      {
        h:'A. Positive pre-operative urine culture',
        organisms:'E. coli, Klebsiella pneumoniae, Proteus spp., Enterococcus spp., GBS.',
        body:'According to C/S result. STAT (single dose)* at least 30–60 minutes before surgery. Re-dose if procedure extends ≥4 hours or blood loss volume ≥1.5 litres.',
        remark:'*EAU & AUA recommendations. Do not routinely continue surgical prophylaxis >24 hours unless: complex procedure, significant mucosal injury/bleeding, or MDRO isolated. Maximum duration in the above scenarios is 3 days.'
      },
      {
        h:'B. Negative pre-operative urine culture — without MDRO risk and/or negative MDRO screen',
        organisms:'E. coli, Klebsiella pneumoniae, Proteus spp., Enterococcus faecalis, GBS.',
        body:'STAT IV Cefazolin 2 g\n\nIf allergic to penicillin: STAT IV Ciprofloxacin 400 mg',
        remark:''
      },
      {
        h:'C. Negative pre-operative urine culture — with MDRO risk and/or positive MDRO screen',
        organisms:'E. coli, Klebsiella pneumoniae, Proteus spp., Pseudomonas aeruginosa, Enterococcus faecalis, GBS.',
        body:'STAT IV Cefazolin 2 g + STAT IV Amikacin 15 mg/kg\nIf MRSA screen positive, add: STAT IV Linezolid 600 mg\n\nAlternative if penicillin-allergic: STAT IV Ciprofloxacin 400 mg + STAT IV Amikacin 15 mg/kg (+ Linezolid if MRSA screen positive)',
        remark:'Aminoglycosides recommended by EAU. Avoid aminoglycosides if patient has renal impairment, and check for alternatives. Modify prophylactic antibiotic if patient is known to be colonized/infected by MDRO in last 6 months.'
      }
    ]
  }
];
const SURG_DURATION = {
  general:'Single IV dose (STAT dose) for most procedures.',
  extended:'24 hours (maximum 3 days) for: prostate biopsy; complex procedure; procedure with significant mucosal injury & bleeding; MDRO isolated (difficult-to-treat, "DTR").'
};

/* ---------------- Guidelines: Sexually Transmitted Diseases ---------------- */
const STD_CONDITIONS = [
  {
    id:'urethritis-cervicitis', title:'Urethritis / Cervicitis',
    organisms:'Chlamydia trachomatis, Neisseria gonorrhoeae, Trichomonas vaginalis',
    first:'STAT IM Ceftriaxone 500 mg + PO Doxycycline 100 mg bd x 7 days',
    second:'If ceftriaxone not available: STAT PO Cefixime 800 mg + PO Doxycycline 100 mg bd x 7 days\n\nIf beta-lactam allergy: STAT IM Gentamicin 240 mg + STAT PO Azithromycin 2 g',
    remarks:'Do not start treatment empirically — test and wait for PCR results. Always perform chlamydia & gonorrhea testing before starting therapy (PCR). Consider giving STAT PO Metronidazole 2 g if Trichomonas vaginalis is suspected (perform urethral discharge wet mount or DNA hybridization before starting therapy).'
  },
  {
    id:'genital-ulcer', title:'Genital Ulcer',
    organisms:'Painless: Treponema pallidum, Chlamydia trachomatis (LGV), Klebsiella granulomatis (donovanosis). Painful: Haemophilus ducreyi, herpes simplex virus (HSV).',
    first:'', second:'',
    remarks:'',
    subtable:[
      {h:'Syphilis chancre (painless)', organisms:'Treponema pallidum', body:'STAT IM Benzathine Penicillin G 2.4 million units\n\nIf penicillin allergy: PO Doxycycline 100 mg x 14 days', remark:'Perform syphilis serology before starting treatment, and monitor the titre 2–4 weeks after treatment.'},
      {h:'LGV (painless)', organisms:'Chlamydia trachomatis (LGV)', body:'PO Doxycycline 100 mg x 21 days\n\nIf contraindication to 1st line: PO Azithromycin 1 g once/week x 3 weeks (3 doses total)', remark:'No specific test is available at SAUC.'},
      {h:'Donovanosis (painless)', organisms:'Klebsiella granulomatis', body:'PO Azithromycin 1 g once/week x 3 weeks minimum or until resolution\n\nIf contraindication to 1st line: PO Doxycycline 100 mg bd x 3 weeks', remark:'No specific test is available at SAUC.'},
      {h:'H. ducreyi (painful)', organisms:'Haemophilus ducreyi', body:'STAT IM Ceftriaxone 250 mg\n\nIf beta-lactam allergy: STAT PO Azithromycin 1 g', remark:'No specific test is available at SAUC.'},
      {h:'HSV (painful) — immunocompetent', organisms:'Herpes simplex virus', body:'Primary episode: PO Acyclovir 400 mg tds x 7–10 days\nRecurrent episode: PO Acyclovir 800 mg tds x 2 days', remark:'CDC recommendations. Confirm diagnosis by pus swab PCR. Long-term suppressive therapy may be required in selected patients.'},
      {h:'HSV — immunocompromised', organisms:'Herpes simplex virus', body:'PO Acyclovir 400 mg tds x 5–10 days', remark:'Confirm diagnosis by pus swab PCR.'}
    ]
  },
  {
    id:'prostatitis-acute-std', title:'Prostatitis — Acute, STD risk',
    organisms:'Neisseria gonorrhoeae, Chlamydia trachomatis, Trichomonas vaginalis.',
    first:'STAT IM Ceftriaxone 500 mg + PO Doxycycline 100 mg bd x 10 days',
    second:'If chlamydia confirmed: PO Azithromycin 2 g once/week x 4 weeks (4 total doses)',
    remarks:'Perform chlamydia/gonorrhea PCR. Consider giving PO Metronidazole 500 mg if Trichomonas vaginalis suspected.'
  },
  {
    id:'prostatitis-acute-nostd', title:'Prostatitis — Acute, no STD risk',
    organisms:'E. coli, Klebsiella pneumoniae, Pseudomonas aeruginosa, Enterococcus spp., Brucella spp.',
    first:'Out-patient: PO Levofloxacin 750 mg od x 14 days (mild) OR 2–4 weeks (severe)\n\nIn-patient, no MDRO risk: IV Levofloxacin 750 mg od x 14 days (mild) OR 2–4 weeks (severe)\n\nIn-patient, MDRO risk: IV Meropenem 2 g tds x 14 days (mild) OR 2–4 weeks (severe)',
    second:'If contraindication to 1st line: PO Trimethoprim-Sulfamethoxazole DS 1 tab bd x 10–14 days',
    remarks:'Send urine C/S +/- blood C/S (if acutely ill and/or systemic signs of infection). If patient is acutely ill with systemic signs: admit & start IV antibiotics. Amikacin can be added for in-patient cases (case-by-case risk assessment). Consider Brucella if compatible history & confirm by serology.'
  },
  {
    id:'prostatitis-chronic-std', title:'Prostatitis — Chronic, STD risk',
    organisms:'Chlamydia trachomatis, Trichomonas vaginalis.',
    first:'PO Doxycycline 100 mg bd x 10 days',
    second:'If contraindication to 1st line: PO Azithromycin 500 mg od x 3 weeks\n\nIf Trichomonas vaginalis suspected: PO Metronidazole 500 mg tds x 14 days',
    remarks:'Perform two-glass test for C/S if feasible. Perform imaging to rule out other causes. Consider Brucella if compatible history & send for serology confirmation.'
  },
  {
    id:'prostatitis-chronic-nostd', title:'Prostatitis — Chronic, no STD risk',
    organisms:'E. coli, Klebsiella pneumoniae, Pseudomonas aeruginosa, Enterococcus spp., Brucella spp.',
    first:'PO Ciprofloxacin 500 mg bd x 4–6 weeks\nOR PO Levofloxacin 750 mg od x 4–6 weeks',
    second:'If contraindication to 1st line: PO Trimethoprim-Sulfamethoxazole DS 1 tab bd x 1–3 months',
    remarks:''
  }
];

/* ---------------- Guidelines: Candiduria ---------------- */
const CANDID_CONDITIONS = [
  {
    id:'asymp-candiduria', title:'Asymptomatic Candiduria',
    organisms:'Candida species',
